<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Engineering - Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #faf8f5; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        let particles = [];
        let seed = 42;
        const NUM = 600;
        const NOISE_SCALE = 0.003;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noiseSeed(seed);
            randomSeed(seed);
            for (let i = 0; i < NUM; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
            background(250, 248, 245);
        }

        function draw() {
            noStroke();
            fill(250, 248, 245, 8);
            rect(0, 0, width, height);

            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = random(1, 2.5);
                this.life = random(100, 400);
                this.age = 0;
                this.size = random(1, 3);
                
                let palette = [
                    [180, 135, 110],  // warm brown
                    [212, 160, 136],  // light warm
                    [160, 112, 88],   // deep brown
                    [200, 180, 160],  // beige
                    [140, 120, 100],  // muted
                ];
                this.col = random(palette);
            }

            update() {
                let angle = noise(this.pos.x * NOISE_SCALE, this.pos.y * NOISE_SCALE, frameCount * 0.002) * TWO_PI * 3;
                let force = p5.Vector.fromAngle(angle);
                force.mult(0.3);
                this.acc.add(force);
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.age++;

                if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height || this.age > this.life) {
                    this.pos = createVector(random(width), random(height));
                    this.age = 0;
                }
            }

            display() {
                let alpha = map(this.age, 0, this.life, 255, 0);
                alpha = constrain(alpha, 0, 255);
                fill(this.col[0], this.col[1], this.col[2], alpha);
                noStroke();
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background(250, 248, 245);
        }
    </script>
</body>
</html>

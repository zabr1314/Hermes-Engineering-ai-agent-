<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5"/>
      <stop offset="100%" style="stop-color:#f3efe9"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b4876e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d4a088;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a07058;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c9a088;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Decorative flowing shapes -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="url(#grad1)" filter="url(#blur1)"/>
  <ellipse cx="900" cy="250" rx="250" ry="180" fill="url(#grad2)" filter="url(#blur1)"/>
  <ellipse cx="600" cy="100" rx="200" ry="150" fill="#b4876e" opacity="0.08" filter="url(#blur2)"/>
  
  <!-- Node network - representing agent connections -->
  <g stroke="#b4876e" stroke-width="1" fill="none" opacity="0.15">
    <line x1="150" y1="120" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="450" y2="140"/>
    <line x1="450" y1="140" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="750" y2="160"/>
    <line x1="750" y1="160" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1050" y2="180"/>
    <line x1="300" y1="180" x2="350" y2="280"/>
    <line x1="600" y1="200" x2="550" y2="300"/>
    <line x1="900" y1="220" x2="850" y2="320"/>
    <line x1="350" y1="280" x2="550" y2="300"/>
    <line x1="550" y1="300" x2="850" y2="320"/>
  </g>
  
  <!-- Nodes -->
  <g fill="#b4876e" opacity="0.25">
    <circle cx="150" cy="120" r="6"/>
    <circle cx="300" cy="180" r="8"/>
    <circle cx="450" cy="140" r="5"/>
    <circle cx="600" cy="200" r="10"/>
    <circle cx="750" cy="160" r="6"/>
    <circle cx="900" cy="220" r="9"/>
    <circle cx="1050" cy="180" r="5"/>
    <circle cx="350" cy="280" r="4"/>
    <circle cx="550" cy="300" r="6"/>
    <circle cx="850" cy="320" r="5"/>
  </g>
  
  <!-- Subtle grid dots -->
  <g fill="#b4876e" opacity="0.06">
    <circle cx="100" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="300" cy="50" r="2"/>
    <circle cx="400" cy="50" r="2"/><circle cx="500" cy="50" r="2"/><circle cx="600" cy="50" r="2"/>
    <circle cx="700" cy="50" r="2"/><circle cx="800" cy="50" r="2"/><circle cx="900" cy="50" r="2"/>
    <circle cx="1000" cy="50" r="2"/><circle cx="1100" cy="50" r="2"/>
    <circle cx="100" cy="350" r="2"/><circle cx="200" cy="350" r="2"/><circle cx="300" cy="350" r="2"/>
    <circle cx="400" cy="350" r="2"/><circle cx="500" cy="350" r="2"/><circle cx="600" cy="350" r="2"/>
    <circle cx="700" cy="350" r="2"/><circle cx="800" cy="350" r="2"/><circle cx="900" cy="350" r="2"/>
    <circle cx="1000" cy="350" r="2"/><circle cx="1100" cy="350" r="2"/>
  </g>
</svg>
